<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlchemistForge</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'af-bg': '#0a0e1a',
            'af-bg-light': '#0d1117',
            'af-card': '#131b2a',
            'af-card-hover': '#1a2332',
            'af-border': '#1e2d3d',
            'af-cyan': '#00d4ff',
          },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0e1a; color: #fff; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track { animation: marquee 30s linear infinite; }
    .dropdown-enter { animation: dropdownIn 0.2s ease-out forwards; }
    @keyframes dropdownIn { from { opacity: 0; transform: scale(0.96) translateY(-8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .btn-cyan { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); color: #0a0e1a; font-weight: 600; transition: all 0.2s ease; }
    .btn-cyan:hover { box-shadow: 0 0 20px rgba(0,212,255,0.4); transform: translateY(-1px); }
    .ecosystem-item { transition: all 0.15s ease; } .ecosystem-item:hover { background: #1a2332; }
    .chevron-rotate { transition: transform 0.2s ease; } .chevron-rotate.open { transform: rotate(180deg); }
    .glow-cyan { text-shadow: 0 0 20px rgba(0,212,255,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const CrystalBallIcon = () => (
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <defs>
          <radialGradient id="ballGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stopColor="#ff8af5" />
            <stop offset="50%" stopColor="#c255e8" />
            <stop offset="100%" stopColor="#7b2cbf" />
          </radialGradient>
          <radialGradient id="standGrad" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stopColor="#ffd700" />
            <stop offset="100%" stopColor="#b8860b" />
          </radialGradient>
        </defs>
        <ellipse cx="16" cy="27" rx="8" ry="3" fill="url(#standGrad)" opacity="0.9" />
        <rect x="13" y="24" width="6" height="3" rx="1" fill="url(#standGrad)" opacity="0.8" />
        <circle cx="16" cy="14" r="10" fill="url(#ballGrad)" />
        <ellipse cx="13" cy="10" rx="3" ry="2.5" fill="white" opacity="0.35" />
        <circle cx="19" cy="17" r="1.5" fill="white" opacity="0.2" />
        <circle cx="16" cy="14" r="10.5" stroke="rgba(255,138,245,0.3)" strokeWidth="0.5" fill="none" />
      </svg>
    );

    const cryptoData = [
      { symbol: 'XRP', price: 1.440, change: 2.1, up: true },
      { symbol: 'XLM', price: 0.1674, change: 3.4, up: true },
      { symbol: 'HBAR', price: 0.0959, change: 4.1, up: true },
      { symbol: 'ALGO', price: 0.1292, change: -0.2, up: false },
      { symbol: 'ADA', price: 0.2813, change: 4.2, up: true },
      { symbol: 'ETH', price: 2348.54, change: 1.4, up: true },
      { symbol: 'BTC', price: 81436.00, change: 1.1, up: true },
      { symbol: 'HNT', label: 'SOVEREIGN WELLNESS TOKEN' },
    ];

    const CryptoTicker = () => {
      const items = [...cryptoData, ...cryptoData];
      return (
        <div className="w-full bg-black/60 border-b border-af-border/50 overflow-hidden py-1.5">
          <div className="marquee-track flex whitespace-nowrap" style={{ width: 'max-content' }}>
            {items.map((c, i) => (
              <span key={i} className="inline-flex items-center gap-1 mx-3 text-xs text-gray-400">
                {c.label ? (
                  <>
                    <span className="text-yellow-400 font-semibold">HNT:</span>
                    <span className="text-yellow-300 uppercase tracking-wider text-[10px]">{c.label}</span>
                  </>
                ) : (
                  <>
                    <span className="font-medium text-gray-300">{c.symbol}:</span>
                    <span className="text-gray-400">${c.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</span>
                    <span className={c.up ? 'text-green-400' : 'text-red-400'}>{c.up ? '\u25B2' : '\u25BC'} {Math.abs(c.change)}%</span>
                  </>
                )}
                <span style={{color:'#00d4ff',fontSize:'10px',marginLeft:'6px',opacity:0.6}}>&#9670;</span>
              </span>
            ))}
          </div>
        </div>
      );
    };

    const ecosystemItems = [
      { name: 'EncryptHealth', icon: '\uD83E\uDDEC', url: 'https://encrypthealth.io', desc: 'Sovereign Health Records' },
      { name: 'HypnoNeuro', icon: '\uD83C\uDFAE', url: 'https://hypnoneuro.io', desc: 'Neuroplasticity Gaming' },
      { name: 'SovereignLedger', icon: '\u2696\uFE0F', url: 'https://sovereignledger.io', desc: 'Decentralized Legal' },
    ];

    const EcosystemDropdown = ({ open, onClose }) => {
      if (!open) return null;
      return (
        <>
          <div className="fixed inset-0 z-40" onClick={onClose} />
          <div className="dropdown-enter absolute top-full left-0 mt-2 z-50 w-72 bg-af-card border border-af-border rounded-xl shadow-2xl shadow-black/50">
            <div className="px-4 py-2.5 border-b border-af-border/60">
              <p className="text-[10px] uppercase tracking-widest text-gray-500 font-medium">FSL Ecosystem</p>
            </div>
            {ecosystemItems.map((item) => (
              <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer"
                className="ecosystem-item flex items-center gap-3 px-4 py-3 border-b border-af-border/30 last:border-0 last:rounded-b-xl"
                onClick={onClose}>
                <span className="text-lg flex-shrink-0">{item.icon}</span>
                <div className="flex-1">
                  <p className="text-sm font-medium text-gray-200">{item.name}</p>
                  <p className="text-[11px] text-gray-500">{item.desc}</p>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-600 flex-shrink-0">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
              </a>
            ))}
          </div>
        </>
      );
    };

    const Header = () => {
      const [dropdownOpen, setDropdownOpen] = useState(false);
      const [walletConnected, setWalletConnected] = useState(false);
      return (
        <header className="w-full sticky top-0 z-50">
          <CryptoTicker />
          <div className="bg-af-bg-light/95 backdrop-blur-md border-b border-af-border/60">
            <div className="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
              <div className="relative">
                <button onClick={() => setDropdownOpen(!dropdownOpen)}
                  className="flex items-center gap-2.5 group cursor-pointer rounded-lg px-2 py-1 -ml-2 transition-colors hover:bg-af-card-hover/60">
                  <CrystalBallIcon />
                  <span className="text-lg font-bold text-gray-100 tracking-tight">AlchemistForge</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                    className={`chevron-rotate text-gray-400 group-hover:text-af-cyan ${dropdownOpen ? 'open text-af-cyan' : ''}`}>
                    <polyline points="6 9 12 15 18 9" />
                  </svg>
                </button>
                <EcosystemDropdown open={dropdownOpen} onClose={() => setDropdownOpen(false)} />
              </div>
              <button onClick={() => setWalletConnected(!walletConnected)} className="btn-cyan px-5 py-2 rounded-lg text-sm font-semibold">
                {walletConnected ? '0x71C...9A3E' : 'Connect EVM Wallet'}
              </button>
            </div>
          </div>
        </header>
      );
    };

    const HeroSection = () => (
      <section className="relative flex flex-col items-center justify-center text-center px-4 py-20 min-h-[60vh]">
        <div className="absolute inset-0 pointer-events-none" style={{
          background: 'radial-gradient(ellipse 50% 40% at 50% 30%, rgba(0,212,255,0.06) 0%, transparent 70%)'
        }} />
        <div className="relative z-10">
          <div className="w-20 h-20 mx-auto mb-6">
            <CrystalBallIcon />
          </div>
          <h1 className="text-5xl md:text-6xl font-bold mb-6 tracking-tight">
            <span className="bg-gradient-to-r from-af-cyan via-purple-400 to-af-cyan bg-clip-text text-transparent glow-cyan">
              TRANSMUTE YOUR SHADOW
            </span>
          </h1>
          <p className="max-w-xl mx-auto text-gray-400 text-lg leading-relaxed mb-10">
            Shadow integration meets blockchain. Name the darkness you carry, alchemize it on-chain,
            and own a permanent, immutable record of your transformation. Your inner work, recorded forever on Sepolia.
          </p>
          <button className="btn-cyan px-8 py-3.5 rounded-xl text-base font-semibold">Begin Your Transmutation</button>
        </div>
      </section>
    );

    const StatsSection = () => (
      <section className="max-w-4xl mx-auto px-4 py-12">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Transmutations', value: '12', icon: '\uD83D\uDD2E' },
            { label: 'Sepolia TXs', value: '14', icon: '\u26D3\uFE0F' },
            { label: 'Shadows Named', value: '12', icon: '\uD83C\uDF11' },
            { label: 'Alchemists', value: '7', icon: '\u2728' },
          ].map((stat) => (
            <div key={stat.label} className="bg-af-card border border-af-border rounded-xl p-5 text-center">
              <div className="text-2xl mb-1">{stat.icon}</div>
              <div className="text-xl font-bold text-af-cyan">{stat.value}</div>
              <div className="text-xs text-gray-500 mt-1 uppercase tracking-wider">{stat.label}</div>
            </div>
          ))}
        </div>
      </section>
    );

    const Footer = () => (
      <footer className="border-t border-af-border/40 py-8 px-4 mt-12">
        <div className="max-w-7xl mx-auto flex flex-wrap items-center justify-center gap-6 text-sm text-gray-500">
          <span className="text-af-cyan font-semibold">AlchemistForge</span>
          <span>&middot;</span>
          <a href="https://sepolia.etherscan.io/address/0xE092336F8f5082e57CcBb341A110C20ad186A324" target="_blank" rel="noopener noreferrer" className="hover:text-af-cyan transition-colors">Sepolia Contract</a>
          <span>&middot;</span>
          <a href="https://github.com/Future-Systems-Lab/alchemist-forge" target="_blank" rel="noopener noreferrer" className="hover:text-af-cyan transition-colors">GitHub</a>
        </div>
      </footer>
    );

    const App = () => (
      <div className="min-h-screen bg-af-bg text-white">
        <Header />
        <main>
          <HeroSection />
          <StatsSection />
        </main>
        <Footer />
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
